# Configurazione scene/coppie/transizioni di PUPA.
# Se questo file manca o e' invalido, brain.py usa gli stessi valori come
# fallback hardcoded (nessuna rottura per chi non lo tocca).
#
# All'avvio, pupa.py confronta questa configurazione con le scene e le
# transizioni REALMENTE presenti nell'installazione OBS collegata, e adatta
# di conseguenza (scene_B mancanti tolte dal pool, transizioni mancanti
# sostituite con Cut/Fade nativi OBS, coppie senza scene_A rimosse). Se
# resta una sola scena in tutto, PUPA lampeggia su quella invece di
# alternare A/B.

couples:
  urbanfree_A:   [spectrumbar_B, tunnelwave_B]
  psicodance_A:  [stormlightning_B, waveform1_B]
  montezuma_A:   [roundedbar_B, waveform2_B]
  kusanagi_A:    [radialspike_B, stormlightning_B]
  mri_A:         [waveform1_B, ring_B]
  futureflash_A: [roundedbar_B, waveform2_B]
  segnali_A:     [spectrumbar_B, ring_B]

couple_transitions:
  urbanfree_A:   [Blur, Displace]
  psicodance_A:  [Displace, Burn]
  montezuma_A:   [Burn, Blur]
  kusanagi_A:    [Burn, Blur]
  mri_A:         [Displace, Blur]
  futureflash_A: [Burn, Displace]
  segnali_A:     [Burn, Displace]

special_scenes:
  wave_kick: wave_kick
  strobo: white_master   # rinominata da strobo_B
  black: black_master

# Pool di colori per la raffica strobo/lampo singolo: ad ogni raffica se ne
# sceglie uno a caso (stesso colore per tutti i frame di QUELLA raffica, non
# cambia a meta'). Se alcuni non esistono ancora in OBS, validate_scenes()
# li toglie automaticamente dal pool.
strobe_color_pool: [white_master, red_master, blue_master, yellow_master]
